<div>
  <div>
    <h3>Add New Entity</h3>
    <label for="object-select">Target Type:</label>
    <select id="object-select" name="object-select">
      <option value="boat">Boat</option>
      <option value="car">Car</option>
      <option value="plane">Plane</option>
    </select>
    <br />
    <label>Target Name: </label>
    <input id="target-name-input" />
    <br />
    <br />

    <button id="add-entity-button">Add New Target</button>
    <br />
    <br />
  </div>

  <div>
    <h3>Add Observation</h3>
    <label for="lat">Latitude:</label>
    <input type="number" id="lat" name="lat" step="any" />
    <br />

    <label for="lng">Longitude:</label>
    <input type="number" id="lng" name="lng" step="any" />
    <br />

    <label for="datetime">Date & Time:</label>
    <input type="datetime-local" id="datetime" name="datetime" />
    <br />
    <br />

    <button id="add-observation-button">Add Observation</button>
    <br />
    <br />
  </div>

  <div>
    <h3>Register Trip</h3>
    <p>TODO - start place</p>
    <p>TODO - start time</p>
    <p>TODO - end place</p>
    <p>TODO - end time</p>
  </div>

  <div>
    <h3>Current Target</h3>
    <label>ID: </label>
    <input id="add-obs-id-input" />
    <label>Type: </label>
    <input id="add-obs-type-input" />
    <label>Label: </label>
    <input id="add-obs-label-input" />
    <br />
    <br />
  </div>

  <button id="show-targets">Show Targets</button>

  <div id="map-container">
    <div id="entity-menu"></div>
    <div id="map" style="width: 75%; height: 600px"></div>
  </div>
</div>
