<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Parallax</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <h1>Parallax</h1>
    <button id="debug-button">Debug</button>
    <div id="map" style="width: 75%; height: 600px;"></div>

    <input type="number" id="lng" name="lng" step="any">

  </body>
</html>
